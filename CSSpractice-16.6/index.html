<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Football Club</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="assets/logo.png" alt="Logo" class="navbar-logo-img">
            <span class="logo-text">Dragon</span>
        </div>
        <div class="nav-container">
            <nav class="nav-links">
                <a href="#" class="active">HOME</a>
                <a href="#">ABOUT</a>
                <a href="#">GAMES</a>
                <a href="#">BLOG</a>
                <a href="#">CONTACT</a>
            </nav>
            <a href="#" class="btn-buy-ticket-nav">BUY TICKET</a>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>DRAGON<br>FOOTBALL CLUB</h1>
            <p class="hero-description">
                A small river named Duden flows by their place and supplies it with the necessary regelialia.
            </p>
            <div class="hero-buttons">
                <a href="#" class="btn-watch">Watch match</a>
                <a href="#" class="btn-ticket">Get ticket</a>
            </div>
        </div>
    </section>

    <section class="countdown-bar">
        <div class="match-info">
            <div class="team">
                <img src="assets/tbn.png" alt="TBN Logo" style="width: 45px; height: 45px; object-fit: contain;">
                <span>Spain</span>
            </div>
            <div class="vs">vs</div>
            <div class="team">
                <img src="assets/phap.jpg" alt="Phap Logo" style="width: 45px; height: 45px; object-fit: contain;">
                <span>France</span>
            </div>
        </div>

        <div class="league-title">
            <h3>World Cup 2026</h3>
            <p>Semi-Final</p>
        </div>

        <div class="timer-container">
            <div class="time-block">
                <span class="time-number">171</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-block">
                <span class="time-number">11</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-block">
                <span class="time-number">10</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-block">
                <span class="time-number">39</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>

        <div class="action-button">
            <a href="#" class="btn-buy-tickets-footer">Buy Tickets</a>
        </div>
    </section>

</body>
</html>
